user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip settings compression for optimal frontend performance
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Maximum file upload limit for heavy CAD/DXF files (Minimum 100MB)
    client_max_body_size 100M;

    server {
        listen 80;
        server_name localhost;

        # Permanent Docker FastCGI Upstream Stabilization via DNS-based resolution
        resolver 127.0.0.11 valid=5s;
        set $laravel_backend "backend-api:9000";

        # Static assets folder (vite react compilation)
        root /usr/share/nginx/html;
        index index.html;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # API requests proxying
        location ^~ /api/ {
            root /var/www/html/public;
            include fastcgi_params;
            fastcgi_pass $laravel_backend;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_param SCRIPT_NAME /index.php;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param QUERY_STRING $query_string;
            fastcgi_param REQUEST_METHOD $request_method;
            fastcgi_param CONTENT_TYPE $content_type;
            fastcgi_param CONTENT_LENGTH $content_length;
            fastcgi_buffering off;
        }

        # Handle PHP scripts via FastCGI (Laravel routing)
        location ~ \.php$ {
            root /var/www/html/public;
            fastcgi_pass $laravel_backend;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_buffering off;
        }

        # Public uploaded file storage paths mapping
        location /storage/ {
            alias /var/www/html/storage/app/public/;
            try_files $uri =404;
        }

        # React Frontend Single Page Application index routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
